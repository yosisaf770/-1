<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הטריוויה של נטי - Bat Mitzvah Edition</title>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Tinos:wght@700&display=swap');

        :root {
            --blush-pink: #f8e1e1;
            --rose-gold: #b76e79;
            --deep-rose: #880e4f;
            --gold: #d4af37;
            --cream: #fffcf9;
            --shadow: 0 15px 45px rgba(136, 14, 79, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--cream);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(183, 110, 121, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        #game-wrapper {
            width: 95%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: var(--shadow);
            border: 4px double var(--gold);
            text-align: center;
            position: relative;
            backdrop-filter: blur(15px);
            z-index: 10;
            margin: 20px 0;
        }

        .volume-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            border: 1px solid var(--rose-gold);
            color: var(--rose-gold);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .screen { display: none; }
        .screen.active { display: block; animation: softFade 0.7s ease-out; }
        @keyframes softFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            color: var(--deep-rose); 
            font-family: 'Tinos', serif; 
            font-size: 2.5rem; 
            margin: 0 0 10px 0;
        }
        
        .subtitle { 
            color: var(--rose-gold); 
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: block;
        }

        .section-label { font-weight: 800; color: var(--rose-gold); margin-bottom: 12px; font-size: 1.1rem; }
        
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            min-height: 160px;
            max-height: 220px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(183, 110, 121, 0.03);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .avatar-item {
            font-size: 1.8rem;
            padding: 10px;
            border: 2px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-item.selected { border-color: var(--gold); background: var(--blush-pink); transform: scale(1.05); }
        .avatar-item.taken { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 2.5px solid var(--blush-pink);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
            font-weight: 700;
            color: var(--deep-rose);
        }

        .btn {
            background: linear-gradient(135deg, var(--rose-gold), var(--deep-rose));
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(136, 14, 79, 0.15);
            transition: all 0.3s;
        }
        .btn:active { transform: scale(0.98); }

        #live-rankings {
            background: white;
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            border: 1px solid var(--blush-pink);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .rank-item { display: flex; flex-direction: column; align-items: center; font-weight: 800; color: var(--deep-rose); font-size: 0.8rem; }
        .rank-avatar { font-size: 1.4rem; margin-bottom: 2px; }

        .question-text { 
            font-size: 1.6rem; 
            font-weight: 800; 
            margin-bottom: 25px; 
            color: #222; 
            line-height: 1.3;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            background: white;
            border: 2px solid var(--blush-pink);
            padding: 18px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .option-btn:hover { border-color: var(--rose-gold); background: #fffcfc; }
        .tf-btn-true { border-color: #a5d6a7; color: #2e7d32; }
        .tf-btn-false { border-color: #ef9a9a; color: #c62828; }

        .leaderboard {
            margin-top: 25px;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 30px;
            padding: 10px;
            background: white;
            border: 1px solid var(--blush-pink);
        }
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f9f9f9; font-size: 1.1rem; }
        .leaderboard-item.top { background: var(--blush-pink); font-weight: 800; border-radius: 15px; color: var(--deep-rose); }

        .confetti { position: fixed; width: 10px; height: 10px; z-index: 100; animation: fall linear forwards; border-radius: 50%; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        @media (max-width: 400px) {
            h1 { font-size: 2rem; }
            .avatar-grid { grid-template-columns: repeat(3, 1fr); min-height: 180px; }
            .question-text { font-size: 1.4rem; }
            .option-btn { padding: 15px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <button id="vol-toggle" class="volume-btn" onclick="window.toggleMute()">🔊</button>

        <!-- Screen 1: Login -->
        <div id="login-screen" class="screen active">
            <h1>הטריוויה של נטי</h1>
            <span class="subtitle">נראה מי באמת מכירה את נטי</span>
            <div id="error-msg" style="color: var(--deep-rose); margin-bottom: 15px; display: none; font-weight: 800;"></div>
            <input type="text" id="player-name" placeholder="השם שלך..." maxlength="12">
            <div class="section-label">בחרי דמות וצאי לדרך:</div>
            <div class="avatar-grid" id="avatar-grid">
                <!-- יתמלא על ידי JS -->
            </div>
            <button class="btn" id="join-btn" onclick="joinGame()">התחל משחק</button>
        </div>

        <!-- Screen 2: Quiz -->
        <div id="quiz-screen" class="screen">
            <div id="live-rankings">
                <div class="rank-item" id="rank-1"><span>🥇</span><span class="rank-avatar">-</span><span>-</span></div>
                <div class="rank-item" id="rank-2"><span>🥈</span><span class="rank-avatar">-</span><span>-</span></div>
                <div class="rank-item" id="rank-3"><span>🥉</span><span class="rank-avatar">-</span><span>-</span></div>
            </div>

            <p id="q-counter" style="color: var(--rose-gold); font-weight: 800; font-size: 1.1rem; margin: 0 0 10px 0;"></p>
            <div id="question-text" class="question-text"></div>
            <div id="options-container" class="options-grid"></div>
        </div>

        <!-- Screen 3: Results -->
        <div id="end-screen" class="screen">
            <h1 style="font-size: 2.5rem;">התוצאות</h1>
            <p id="personal-result" style="color: var(--deep-rose); font-size: 1.5rem; font-weight: 800; margin: 20px 0;"></p>
            <div class="leaderboard" id="leaderboard-list">טוען נתונים...</div>
            <button class="btn" style="margin-top:30px; background: white; color: var(--rose-gold); border: 2px solid var(--rose-gold);" onclick="location.reload()">חזרה להתחלה</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Initialization
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'nati-bat-mitzvah-mobile-fix';

        const music = document.getElementById('bg-music');
        let userName = "", selectedAvatar = "", currentScore = 0, currentQIndex = 0;
        let takenAvatars = new Set(), syncInitialized = false;

        const avatarPool = ["👸", "🧚‍♀️", "🧜‍♀️", "👗", "💍", "🎀", "💄", "🍭", "🧁", "🍓", "🌸", "🌷", "🌹", "🌈", "🦄", "🐱", "🐨", "🦋", "🎨", "🎤"];

        const questions = [
            { q: "מהו הצבע האהוב על נטי?", opts: ["כחול", "ורוד", "צהוב", "ירוק"], ans: 1 },
            { q: "מהו המאכל האהוב על נטי?", opts: ["סושי", "פירה", "גם סושי וגם פירה", "פיצה"], ans: 2 },
            { q: "מהו התחביב האהוב על נטי?", opts: ["לצייר", "לשיר", "לרקוד", "לשחק כדורסל"], ans: 2 },
            { q: "מהו הממתק האהוב על נטי?", opts: ["סוכריות גומי", "שוקולד", "מרשמלו", "טופי"], ans: 1 },
            { q: "ממה נטי הכי פוחדת?", opts: ["כלבים", "גבהים", "חושך", "חרקים"], ans: 3 },
            { q: "מהי החיה האהובה על נטי?", opts: ["תוכי", "חתול", "כלב", "ארנב"], ans: 0 },
            { q: "באיזה בית חולים נטי נולדה?", opts: ["פתח תקווה", "שערי צדק", "בילינסון", "תל השומר"], ans: 1 },
            { q: "מהי העונה האהובה על נטי?", opts: ["קיץ", "אביב", "סתיו", "חורף"], ans: 3 },
            { q: "באילו ארצות נטי ביקרה?", opts: ["לונדון ופריז", "קפריסין וניו יורק", "איטליה ויוון", "תאילנד"], ans: 1 },
            { q: "איך קוראים למחנכת של נטי?", opts: ["מיכל", "שרה", "אסתר", "רחל"], ans: 2 },
            { q: "איזו חיית מחמד יש לנטי בבית?", opts: ["כלב", "חתול", "אוגר", "דגים"], ans: 2 },
            { q: "מה נטי עושה בדרך כלל במהלך השיעורים?", opts: ["מקשיבה בריכוז", "מציירת", "משחקת בטלפון", "כותבת שירים"], ans: 1 },
            { q: "מהו החג האהוב על נטי?", opts: ["פסח", "פורים", "סוכות", "חנוכה"], ans: 2 },
            { q: "מהו הצבע שנטי הכי שונאת?", opts: ["שחור", "אפור", "חום", "סגול"], ans: 1 },
            { q: "נכון או לא נכון: התגלגלתי במדרגות כשהייתי בת 3", opts: ["נכון", "לא נכון"], ans: 0, type: "tf" },
            { q: "נכון או לא נכון: אני שונאת תמרים", opts: ["נכון", "לא נכון"], ans: 0, type: "tf" },
            { q: "נכון או לא נכון: יש לי אוסף של קליפסים לשיער", opts: ["נכון", "לא נכון"], ans: 0, type: "tf" },
            { q: "נכון או לא נכון: אני עכשיו בכיתה ח'", opts: ["נכון", "לא נכון"], ans: 1, type: "tf" },
            { q: "נכון או לא נכון: אני עכשיו בכיתה ו'", opts: ["נכון", "לא נכון"], ans: 0, type: "tf" },
            { q: "נכון או לא נכון: השתייה האהובה עלי היא מים בטעמים", opts: ["נכון", "לא נכון"], ans: 0, type: "tf" },
            { q: "נכון או לא נכון: יש לי 10 אחיות", opts: ["נכון", "לא נכון"], ans: 1, type: "tf" },
            { q: "נכון או לא נכון: נולדתי ביערות הגשם", opts: ["נכון", "לא נכון"], ans: 1, type: "tf" }
        ];

        window.toggleMute = () => {
            music.muted = !music.muted;
            document.getElementById('vol-toggle').innerText = music.muted ? "🔇" : "🔊";
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) { console.error("Auth Error:", error); }
        };

        function renderAvatars() {
            const grid = document.getElementById('avatar-grid');
            if (!grid) return;
            grid.innerHTML = '';
            avatarPool.forEach(av => {
                const isTaken = takenAvatars.has(av) && selectedAvatar !== av;
                const div = document.createElement('div');
                div.className = `avatar-item ${selectedAvatar === av ? 'selected' : ''} ${isTaken ? 'taken' : ''}`;
                div.innerText = av;
                if (!isTaken) div.onclick = () => { 
                    selectedAvatar = av; 
                    renderAvatars(); 
                };
                grid.appendChild(div);
            });
        }

        window.joinGame = async () => {
            const name = document.getElementById('player-name').value.trim();
            if (!name || !selectedAvatar) { showError("אנא הזיני שם ובחרי דמות"); return; }
            if (!auth.currentUser) { showError("מתחבר... נסי שוב"); return; }

            userName = name;
            document.getElementById('join-btn').disabled = true;

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', auth.currentUser.uid), {
                    name: userName, avatar: selectedAvatar, score: 0, timestamp: Date.now()
                });
                music.volume = 0.1;
                music.play().catch(() => {});
                showScreen('quiz-screen');
                loadQuestion();
            } catch(e) {
                console.error(e);
                document.getElementById('join-btn').disabled = false;
                showError("שגיאת חיבור");
            }
        };

        function showError(msg) {
            const e = document.getElementById('error-msg');
            if(e) { e.innerText = msg; e.style.display = 'block'; setTimeout(() => e.style.display = 'none', 3000); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function loadQuestion() {
            if (currentQIndex >= questions.length) { finishGame(); return; }
            const q = questions[currentQIndex];
            document.getElementById('q-counter').innerText = `שאלה ${currentQIndex + 1} מתוך ${questions.length}`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.opts.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                if (q.type === "tf") b.classList.add(idx === 0 ? 'tf-btn-true' : 'tf-btn-false');
                b.innerText = opt;
                b.onclick = () => selectAnswer(idx);
                container.appendChild(b);
            });
        }

        async function selectAnswer(idx) {
            if (idx === questions[currentQIndex].ans) {
                currentScore++;
            }
            const percent = Math.round((currentScore / questions.length) * 100);
            if (auth.currentUser) {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', auth.currentUser.uid), { score: percent });
                } catch (e) { console.error(e); }
            }
            currentQIndex++;
            loadQuestion();
        }

        function startSync() {
            if (!auth.currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            onSnapshot(colRef, (snap) => {
                const players = [];
                takenAvatars.clear();
                snap.forEach(d => {
                    const p = d.data();
                    players.push(p);
                    if (p.avatar) takenAvatars.add(p.avatar);
                });
                renderAvatars();
                players.sort((a,b) => b.score - a.score || a.timestamp - b.timestamp);
                for (let i = 1; i <= 3; i++) {
                    const el = document.getElementById(`rank-${i}`);
                    if (el) {
                        if (players[i-1]) {
                            el.children[1].innerText = players[i-1].avatar;
                            el.children[2].innerText = `${players[i-1].name} (${players[i-1].score}%)`;
                        } else {
                            el.children[1].innerText = "-";
                            el.children[2].innerText = "-";
                        }
                    }
                }
                const list = document.getElementById('leaderboard-list');
                if (list && document.getElementById('end-screen').classList.contains('active')) {
                    list.innerHTML = players.map((p, i) => `
                        <div class="leaderboard-item ${i===0?'top':''}">
                            <span>${i+1}. ${p.avatar} ${p.name}</span>
                            <span>${p.score}%</span>
                        </div>
                    `).join('');
                }
            }, (error) => console.error(error));
        }

        async function finishGame() {
            showScreen('end-screen');
            const percent = Math.round((currentScore / questions.length) * 100);
            document.getElementById('personal-result').innerText = `${userName}, הציון הסופי שלך הוא ${percent}%!`;
            for(let i=0; i<60; i++) setTimeout(() => createConfetti(), i * 60);
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#f4dada', '#b76e79', '#d4af37', '#880e4f'][Math.floor(Math.random()*4)];
            c.style.animationDuration = (Math.random() * 2 + 2) + 's';
            c.style.top = '-10px';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }

        onAuthStateChanged(auth, (user) => { 
            if (user && !syncInitialized) {
                syncInitialized = true;
                startSync(); 
            }
        });

        initAuth();
        renderAvatars();
    </script>
</body>
</html>
